# 与神对话 - Nginx 配置
# 前端静态文件 + 后端 API 反向代理
# 部署到 /etc/nginx/sites-available/yushenduihua 并软链到 sites-enabled

server {
    listen 80;
    server_name your-domain.com;  # 改成你的域名或 IP

    # 上传大小上限，需 >= 后端 MAX_VIDEO_MB/MAX_FILE_MB（backend/config.py，均为 1024MB），
    # 否则视频/大文件上传会被 nginx 拦成 413，而不是走到后端的校验逻辑
    client_max_body_size 1100m;

    # 前端静态文件（Vue 构建产物）
    root /path/to/frontend-vue/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    # API 反向代理到后端
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 支持（AI 流式回复）
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # 上传文件访问
    location /uploads/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA 路由：所有非文件请求返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
